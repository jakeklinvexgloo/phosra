name: Phosra
options:
  bundleIdPrefix: com.phosra
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_OUTPUT_FORMAT: "XML"
    APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING: "YES"
    DEVELOPMENT_TEAM: "UANQHU972G"
    CODE_SIGN_STYLE: "Automatic"

targets:
  Phosra:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phosra.app.dev
        INFOPLIST_FILE: Sources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Phosra
        CFBundleName: Phosra
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: com.phosra.app.dev
            CFBundleURLSchemes:
              - phosra-app
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    dependencies:
      - target: PhosraWidgets

  PhosraWidgets:
    type: app-extension
    platform: iOS
    sources:
      - PhosraWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phosra.app.dev.widgets
        INFOPLIST_FILE: PhosraWidgets/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: PhosraWidgets/Info.plist
      properties:
        CFBundleDisplayName: Phosra Widgets
        CFBundleName: PhosraWidgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  Phosra:
    build:
      targets:
        Phosra: all
        PhosraWidgets: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

configs:
  Debug: debug
  Release: release
